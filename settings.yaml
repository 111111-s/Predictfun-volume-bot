# ==========================================
# Predict.fun Split Market Maker
# Настройки
# ==========================================

# ==========================================
# API доступ (ОБЯЗАТЕЛЬНО!)
# ==========================================
# API ключ можно получить в Discord: https://discord.gg/predictdotfun
# Канал: #api-access
predict:
  api_key: ""  # <-- Вставьте ваш API ключ тут!

# Общие
general:
  shuffle_wallets: true      # Перемешивать кошельки
  threads: 1                 # Потоков (для 50+ аккаунтов: 5-15)
  retry_count: 3             # Повторов при ошибках
  dry_run: false             # Режим симуляции (ордера не создаются, on-chain не выполняется)

# Gas настройки (BNB Chain)
gas:
  gwei_multiplier: 1.2       # Множитель газа (1.5 = +50% к базовой цене)
  max_gas_price_gwei: 10.0   # Максимальная цена газа (gwei). Защита от spike'ов

# ==========================================
# МАРКЕТЫ
# ==========================================
# Список маркетов в отдельном файле: input_data/markets.yaml

markets:
  # Сколько маркетов использовать для 1 аккаунта [min, max] only split 
  markets_per_account: [1, 1]
  
  # Сумма сплита [min, max] USDT
  # Бот сплитнет USDT → получит YES + NO токены (одинаковое количество)
  split_amount: [10, 15]
  
  # Общее количество циклов на аккаунт [min, max]
  cycles: [3, 6]

# ==========================================
# Лимитные ордера
# ==========================================
limits:
  # === BUY ордера ===
  # Шаг цены (центы) от best_bid:
  #   > 0: агрессивно, выше best_bid (0.1 = best_bid + 0.1¢)
  #   = 0: ставим ровно по best_bid
  #   < 0: пассивно, ниже best_bid (-0.2 = best_bid - 0.2¢)
  # Во всех режимах бот следит за best_bid и перевыставляет ордер
  buy_price_step: 0.0
  
  # === SELL ордера ===
  # Наценка от цены покупки (центы):
  # Пример: купил по 83.2¢, sell_price_step: 0.5 → продает по 83.7¢
  sell_price_step: 0.1
  min_spread: 0.1            # Мин. спред (защита от самопокупки)
  check_interval: 3          # Интервал проверки стакана (сек)
  repost_if_not_best: true   # Перевыставлять если не лучшая цена
  repost_up_if_gap: true     # Перевыставлять ВВЕРХ если появился зазор
  
  # Минимальное количество токенов для продажи
  min_sell_amount: 1.0       # Меньше 1 токена = dust (нельзя продать)
  
  # Порог пыли - ордера дешевле этой суммы считаются пылью
  dust_threshold_usd: 1.35   # Минимальная стоимость ордера ($)
  
  # Порог для ре-сплита: если остаток меньше этой суммы - новый цикл
  resplit_threshold_usd: 5.0 # Если YES/NO остаток < $5 после продажи другой стороны
  
  # Обработка ошибок API
  retry_on_fail: 3           # Повторов при ошибке создания ордера
  order_verify_retries: 3    # Попыток проверки/перевыставления ордера
  balance_wait_timeout: 30   # Таймаут ожидания возврата баланса (сек)
  balance_check_interval: 1  # Интервал проверки баланса (сек)

# ==========================================
# Стоп-лосс
# ==========================================
stop_loss:
  enabled: true              # Включен
  percent: 10.0              # % падения для срабатывания
  blacklist_on_sl: true      # Добавлять маркет в blacklist после SL

# ==========================================
# Алерты (в Telegram)
# ==========================================
alerts:
  min_bnb: 0.0005            # Алерт при низком BNB
  min_usdt: 5.0              # Алерт при низком USDT

# ==========================================
# Telegram
# ==========================================
telegram:
  bot_token: ""              # Токен бота (@BotFather)
  user_ids: []               # ID юзеров [123456789, 987654321]

# ==========================================
# Статистика
# ==========================================
statistics:
  send_to_telegram: false    # Отправлять статистику в Telegram

# ==========================================
# Задержки (секунды) [min, max]
# ==========================================
sleep:
  after_split: [5, 10]       # После сплита (API sync)
  between_orders: [2, 5]     # Между ордерами на разные маркеты
  after_order_check: [10, 25] # После выставления перед проверкой
  between_cycles: [5, 15]    # Между циклами
  after_account: [10, 20]    # После завершения аккаунта
  between_threads: [1, 3]    # Между запуском потоков
  after_repost: [1, 2]       # После перевыставления
  small_pause: [1, 2]        # Мелкие паузы

# ==========================================
# RPC ноды BSC
# ==========================================
rpcs:
  - "https://bsc-dataseed1.binance.org"
  - "https://bsc-dataseed2.binance.org"
  - "https://bsc-dataseed3.binance.org"
  - "https://bsc-dataseed4.binance.org"
  - "https://rpc-bsc.48.club"
  - "https://bsc.meowrpc.com"
